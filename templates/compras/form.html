{% extends "base.html" %}
{% block page_title %}Novo Pedido de Compra{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h5 class="fw-bold mb-0">Registrar Pedido de Compra</h5>
  <a href="/compras/" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Voltar</a>
</div>
<div class="card p-4" style="max-width:500px;">
  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Produto *</label>
      <select name="produto_id" class="form-select" required>
        <option value="">Selecione...</option>
        {% for p in produtos %}
          <option value="{{ p.id }}">{{ p.nome }} (estoque: {{ p.quantidade }})</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label">Fornecedor *</label>
      <select name="fornecedor_id" class="form-select" required>
        <option value="">Selecione...</option>
        {% for f in fornecedores %}
          <option value="{{ f.id }}">{{ f.nome }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-4">
      <label class="form-label">Quantidade *</label>
      <input type="number" name="quantidade" class="form-control" min="1" step="0.01" value="1" required>
    </div>
    <button type="submit" class="btn btn-primary">
      <i class="bi bi-cart-plus me-1"></i>Registrar Pedido
    </button>
  </form>
</div>
{% endblock %}
