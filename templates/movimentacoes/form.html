{% extends "base.html" %}
{% block page_title %}Nova Movimentação{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h5 class="fw-bold mb-0">Registrar Movimentação</h5>
  <a href="/movimentacoes/" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Voltar</a>
</div>
<div class="card p-4" style="max-width:520px;">
  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Produto *</label>
      <select name="produto_id" class="form-select" required>
        <option value="">Selecione...</option>
        {% for p in produtos %}
          <option value="{{ p.id }}">{{ p.nome }} (estoque: {{ p.quantidade }} {{ p.unidade }})</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label">Tipo *</label>
      <div class="d-flex gap-3 flex-wrap">
        <div class="form-check">
          <input class="form-check-input" type="radio" name="tipo" value="entrada" id="entrada" checked>
          <label class="form-check-label text-success fw-bold" for="entrada">
            <i class="bi bi-arrow-down-circle"></i> Entrada
          </label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="tipo" value="saida" id="saida">
          <label class="form-check-label text-danger fw-bold" for="saida">
            <i class="bi bi-arrow-up-circle"></i> Saída
          </label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="tipo" value="ajuste" id="ajuste">
          <label class="form-check-label text-primary fw-bold" for="ajuste">
            <i class="bi bi-sliders"></i> Ajuste
          </label>
        </div>
      </div>
      <div class="form-text">Ajuste sobrescreve o saldo diretamente (use para correções de inventário).</div>
    </div>
    <div class="mb-3">
      <label class="form-label">Quantidade *</label>
      <input type="number" name="quantidade" class="form-control" min="0" step="0.01" value="1" required>
    </div>
    <div class="mb-4">
      <label class="form-label">Observação</label>
      <input type="text" name="observacao" class="form-control" placeholder="Opcional...">
    </div>
    <button type="submit" class="btn btn-primary">
      <i class="bi bi-check-lg me-1"></i>Registrar
    </button>
  </form>
</div>
{% endblock %}
