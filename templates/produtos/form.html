{% extends "base.html" %}
{% block page_title %}{{ 'Editar' if produto else 'Novo' }} Produto{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h5 class="fw-bold mb-0">{{ 'Editar Produto' if produto else 'Cadastrar Produto' }}</h5>
  <a href="/produtos/" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left me-1"></i>Voltar
  </a>
</div>

<div class="card p-4" style="max-width:600px;">
  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Nome do Produto *</label>
      <input type="text" name="nome" class="form-control"
             value="{{ produto.nome if produto else '' }}" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Categoria</label>
      <input type="text" name="categoria" class="form-control"
             value="{{ produto.categoria if produto else '' }}"
             placeholder="Ex: Eletrônicos, Ferramentas...">
    </div>
    <div class="row g-3 mb-3">
      {% if not produto %}
      <div class="col">
        <label class="form-label">Quantidade Inicial</label>
        <input type="number" name="quantidade" class="form-control" value="0" min="0" required>
      </div>
      {% endif %}
      <div class="col">
        <label class="form-label">Estoque Mínimo</label>
        <input type="number" name="estoque_minimo" class="form-control"
               value="{{ produto.estoque_minimo if produto else 5 }}" min="0" required>
      </div>
      <div class="col">
        <label class="form-label">Preço (R$)</label>
        <input type="number" name="preco" class="form-control" step="0.01"
               value="{{ produto.preco if produto else '0.00' }}" min="0" required>
      </div>
    </div>

    <button type="submit" class="btn btn-primary">
      <i class="bi bi-check-lg me-1"></i>{{ 'Salvar Alterações' if produto else 'Cadastrar' }}
    </button>
  </form>
</div>
{% endblock %}
